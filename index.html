<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <meta name="theme-color" content="#111827" />

  <link rel="manifest" href="./manifest.json" />

  <title>Lady Lancers Game Tracker</title>

  <style>
    :root {
      --page-background: #eef1f5;
      --dark: #111827;
      --border: #d1d5db;
      --muted: #6b7280;
      --oreb: #15803d;
      --dreb: #1d4ed8;
      --live-turnover: #d97706;
      --dead-turnover: #4b5563;
      --opponent-oreb: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: var(--page-background);
      color: var(--dark);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      touch-action: manipulation;
      cursor: pointer;
    }

    .app {
      width: 100%;
      max-width: 1050px;
      min-height: 100vh;
      margin: 0 auto;
      padding:
        max(18px, env(safe-area-inset-top))
        16px
        max(30px, env(safe-area-inset-bottom));
    }

    .app-title {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
    }

    .app-subtitle {
      margin: 4px 0 16px;
      color: var(--muted);
    }

    .game-information {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .game-information input,
    .game-information select {
      width: 100%;
      min-height: 56px;
      padding: 10px 13px;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: white;
      font-size: 18px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 5px;
      margin-bottom: 16px;
      border-radius: 16px;
      background: #dfe3e8;
    }

    .tab-button {
      min-height: 54px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #4b5563;
      font-weight: 850;
    }

    .tab-button.active {
      background: white;
      color: var(--dark);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .tracking-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 13px;
    }

    .stat-button {
      position: relative;
      width: 100%;
      min-height: 132px;
      padding: 16px;
      border: 0;
      border-radius: 22px;
      color: white;
      text-align: left;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.14);
    }

    .stat-button:active {
      transform: scale(0.985);
      filter: brightness(0.92);
    }

    .oreb {
      background: var(--oreb);
    }

    .dreb {
      background: var(--dreb);
    }

    .live-turnover {
      background: var(--live-turnover);
    }

    .dead-turnover {
      background: var(--dead-turnover);
    }

    .opponent-oreb {
      background: var(--opponent-oreb);
    }

    .stat-name {
      display: block;
      max-width: 72%;
      font-size: clamp(18px, 3.5vw, 25px);
      font-weight: 900;
      line-height: 1.08;
      text-transform: uppercase;
    }

    .stat-count {
      display: block;
      margin-top: 9px;
      font-size: clamp(42px, 9vw, 70px);
      font-weight: 950;
      line-height: 0.95;
    }

    .plus-symbol {
      position: absolute;
      right: 18px;
      top: 50%;
      display: grid;
      width: 72px;
      height: 72px;
      place-items: center;
      transform: translateY(-50%);
      border: 3px solid rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      font-size: 53px;
    }

    .game-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .action-button {
      min-height: 62px;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 15px;
      background: white;
      color: var(--dark);
      font-size: 17px;
      font-weight: 850;
    }

    .next-quarter-button,
    .save-game-button,
    .copy-button {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .new-game-button {
      color: #991b1b;
    }

    .current-quarter-message {
      margin-top: 13px;
      text-align: center;
      color: var(--muted);
      font-weight: 750;
    }

    .summary-section {
      margin-bottom: 24px;
    }

    .summary-heading {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      min-height: 104px;
      padding: 13px;
      border-radius: 17px;
      color: white;
    }

    .summary-label {
      min-height: 38px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .summary-value {
      display: block;
      margin-top: 4px;
      font-size: 36px;
      font-weight: 950;
    }

    .summary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .summary-actions button {
      min-height: 60px;
      border-radius: 15px;
      font-weight: 850;
    }

    .save-game-button,
    .copy-button {
      border: 0;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 17px;
      background: white;
      box-shadow: 0 2px 9px rgba(0, 0, 0, 0.07);
    }

    table {
      width: 100%;
      min-width: 650px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }

    th {
      background: #f8fafc;
      font-size: 13px;
      text-transform: uppercase;
    }

    th:first-child,
    td:first-child {
      padding-left: 14px;
      text-align: left;
      font-weight: 850;
    }

    .saved-game {
      margin-bottom: 14px;
      padding: 16px;
      border-radius: 18px;
      background: white;
      box-shadow: 0 2px 9px rgba(0, 0, 0, 0.08);
    }

    .saved-game-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .saved-opponent {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .saved-meta {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .saved-score {
      font-size: 24px;
      font-weight: 950;
      white-space: nowrap;
    }

    .saved-game-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .saved-game-actions button {
      min-height: 50px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      font-weight: 800;
    }

    .delete-button {
      color: #991b1b;
    }

    .saved-details {
      display: none;
      margin-top: 16px;
    }

    .saved-details.visible {
      display: block;
    }

    .empty-history {
      padding: 28px;
      border-radius: 18px;
      background: white;
      text-align: center;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 20;
      padding: 11px 18px;
      transform: translateX(-50%);
      border-radius: 30px;
      background: rgba(17, 24, 39, 0.94);
      color: white;
      font-weight: 750;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .toast.visible {
      opacity: 1;
    }

    @media (min-width: 720px) {
      .tracking-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-button:last-child {
        grid-column: 1 / -1;
      }

      .summary-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    @media (min-width: 950px) {
      .tracking-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .stat-button {
        min-height: 230px;
        text-align: center;
      }

      .stat-button:last-child {
        grid-column: auto;
      }

      .stat-name {
        max-width: none;
        min-height: 60px;
        font-size: 18px;
      }

      .stat-count {
        font-size: 64px;
      }

      .plus-symbol {
        position: static;
        width: 78px;
        height: 78px;
        margin: 18px auto 0;
        transform: none;
      }
    }

    @media (max-width: 540px) {
      .game-information,
      .summary-actions,
      .game-actions,
      .saved-game-actions {
        grid-template-columns: 1fr;
      }

      .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 class="app-title">Lady Lancers Game Tracker</h1>

    <p class="app-subtitle">
      Track the current game and save completed games permanently.
    </p>

    <section class="game-information">
      <input
        id="opponent"
        type="text"
        placeholder="Opponent — for example, MMU"
      />

      <select id="quarter">
        <option value="1">Quarter 1</option>
        <option value="2">Quarter 2</option>
        <option value="3">Quarter 3</option>
        <option value="4">Quarter 4</option>
      </select>
    </section>

    <nav class="tabs">
      <button id="trackTab" class="tab-button active">
        🏀 Track
      </button>

      <button id="summaryTab" class="tab-button">
        📊 Summary
      </button>

      <button id="historyTab" class="tab-button">
        💾 Saved Games
      </button>
    </nav>

    <section id="trackScreen" class="screen active">
      <div id="trackingGrid" class="tracking-grid"></div>

      <div class="game-actions">
        <button id="undoButton" class="action-button">
          Undo last tap
        </button>

        <button
          id="nextQuarterButton"
          class="action-button next-quarter-button"
        >
          Next quarter
        </button>

        <button
          id="newGameButton"
          class="action-button new-game-button"
        >
          Start new game
        </button>
      </div>

      <p
        id="currentQuarterMessage"
        class="current-quarter-message"
      ></p>
    </section>

    <section id="summaryScreen" class="screen">
      <div class="summary-actions">
        <button id="saveGameButton" class="save-game-button">
          Save completed game
        </button>

        <button id="copyReportButton" class="copy-button">
          Copy current report
        </button>
      </div>

      <section class="summary-section">
        <h2 class="summary-heading">First Half</h2>
        <div id="firstHalfSummary" class="summary-grid"></div>
      </section>

      <section class="summary-section">
        <h2 class="summary-heading">Second Half</h2>
        <div id="secondHalfSummary" class="summary-grid"></div>
      </section>

      <section class="summary-section">
        <h2 class="summary-heading">Game Totals</h2>
        <div id="gameSummary" class="summary-grid"></div>
      </section>

      <section class="summary-section">
        <h2 class="summary-heading">Quarter Breakdown</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Quarter</th>
                <th>OREB</th>
                <th>DREB</th>
                <th>Live TO</th>
                <th>Dead TO</th>
                <th>Opp OREB</th>
              </tr>
            </thead>

            <tbody id="quarterTable"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="historyScreen" class="screen">
      <div id="savedGamesList"></div>
    </section>
  </main>

  <div id="toast" class="toast">Saved</div>

  <script>
    const statDefinitions = [
      {
        key: "oreb",
        name: "Our offensive rebounds",
        shortName: "Our OREB",
        className: "oreb"
      },
      {
        key: "dreb",
        name: "Our defensive rebounds",
        shortName: "Our DREB",
        className: "dreb"
      },
      {
        key: "liveTurnovers",
        name: "Live-ball turnovers",
        shortName: "Live TO",
        className: "live-turnover"
      },
      {
        key: "deadTurnovers",
        name: "Dead-ball turnovers",
        shortName: "Dead TO",
        className: "dead-turnover"
      },
      {
        key: "opponentOreb",
        name: "Opponent offensive rebounds",
        shortName: "Opp OREB",
        className: "opponent-oreb"
      }
    ];

    function emptyQuarter() {
      return {
        oreb: 0,
        dreb: 0,
        liveTurnovers: 0,
        deadTurnovers: 0,
        opponentOreb: 0
      };
    }

    function createNewGame() {
      return {
        opponent: "",
        quarter: 1,
        history: [],
        quarters: {
          1: emptyQuarter(),
          2: emptyQuarter(),
          3: emptyQuarter(),
          4: emptyQuarter()
        }
      };
    }

    function loadCurrentGame() {
      try {
        return (
          JSON.parse(
            localStorage.getItem("ladyLancersGameTracker")
          ) || createNewGame()
        );
      } catch {
        return createNewGame();
      }
    }

    function loadSavedGames() {
      try {
        return (
          JSON.parse(
            localStorage.getItem("ladyLancersSavedGames")
          ) || []
        );
      } catch {
        return [];
      }
    }

    let gameState = loadCurrentGame();
    let savedGames = loadSavedGames();

    function saveCurrentGame() {
      localStorage.setItem(
        "ladyLancersGameTracker",
        JSON.stringify(gameState)
      );
    }

    function saveGameHistory() {
      localStorage.setItem(
        "ladyLancersSavedGames",
        JSON.stringify(savedGames)
      );
    }

    function quarterValue(game, quarter, statKey) {
      return Number(
        game.quarters[quarter][statKey] || 0
      );
    }

    function periodTotal(game, statKey, quarters) {
      return quarters.reduce((total, quarter) => {
        return total + quarterValue(game, quarter, statKey);
      }, 0);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");

      toast.textContent = message;
      toast.classList.add("visible");

      clearTimeout(showToast.timeout);

      showToast.timeout = setTimeout(() => {
        toast.classList.remove("visible");
      }, 1200);
    }

    function addStat(statKey) {
      const quarter = gameState.quarter;

      gameState.quarters[quarter][statKey] += 1;

      gameState.history.push({
        quarter,
        statKey
      });

      saveCurrentGame();
      render();
      showToast("+1 saved");
    }

    function undoLastTap() {
      const last = gameState.history.pop();

      if (!last) {
        showToast("Nothing to undo");
        return;
      }

      gameState.quarters[last.quarter][last.statKey] =
        Math.max(
          0,
          gameState.quarters[last.quarter][last.statKey] - 1
        );

      saveCurrentGame();
      render();
      showToast("Last tap undone");
    }

    function moveToNextQuarter() {
      if (gameState.quarter >= 4) {
        showToast("Already in Quarter 4");
        return;
      }

      gameState.quarter += 1;
      saveCurrentGame();
      render();
      showToast(`Quarter ${gameState.quarter}`);
    }

    function startNewGame() {
      const confirmed = confirm(
        "Start a new game? Make sure the current game has been saved first."
      );

      if (!confirmed) {
        return;
      }

      gameState = createNewGame();
      saveCurrentGame();
      render();
      showScreen("track");
      showToast("New game started");
    }

    function saveCompletedGame() {
      const opponent =
        gameState.opponent.trim() ||
        prompt("Who was the opponent?");

      if (!opponent) {
        return;
      }

      const ourScore = prompt(
        "Enter the Lady Lancers' final score:"
      );

      if (ourScore === null) {
        return;
      }

      const opponentScore = prompt(
        `Enter ${opponent}'s final score:`
      );

      if (opponentScore === null) {
        return;
      }

      const savedGame = {
        id: Date.now(),
        opponent,
        date: new Date().toLocaleDateString(),
        ourScore: ourScore.trim(),
        opponentScore: opponentScore.trim(),
        quarters: JSON.parse(
          JSON.stringify(gameState.quarters)
        )
      };

      savedGames.unshift(savedGame);
      saveGameHistory();
      renderSavedGames();
      showToast("Game saved");

      showScreen("history");
    }

    function createSummaryCards(game, quarters) {
      return statDefinitions
        .map((stat) => {
          const total = periodTotal(
            game,
            stat.key,
            quarters
          );

          return `
            <article class="summary-card ${stat.className}">
              <div class="summary-label">
                ${stat.shortName}
              </div>

              <span class="summary-value">
                ${total}
              </span>
            </article>
          `;
        })
        .join("");
    }

    function createQuarterTable(game) {
      return [1, 2, 3, 4]
        .map((quarter) => {
          const stats = game.quarters[quarter];

          return `
            <tr>
              <td>Q${quarter}</td>
              <td>${stats.oreb}</td>
              <td>${stats.dreb}</td>
              <td>${stats.liveTurnovers}</td>
              <td>${stats.deadTurnovers}</td>
              <td>${stats.opponentOreb}</td>
            </tr>
          `;
        })
        .join("");
    }

    function renderTrackingButtons() {
      const grid =
        document.getElementById("trackingGrid");

      grid.innerHTML = statDefinitions
        .map((stat) => {
          const count =
            gameState.quarters[gameState.quarter][stat.key];

          return `
            <button
              class="stat-button ${stat.className}"
              data-stat-key="${stat.key}"
            >
              <span class="stat-name">
                ${stat.name}
              </span>

              <span class="stat-count">
                ${count}
              </span>

              <span class="plus-symbol">
                +
              </span>
            </button>
          `;
        })
        .join("");

      document
        .querySelectorAll("[data-stat-key]")
        .forEach((button) => {
          button.addEventListener("click", () => {
            addStat(button.dataset.statKey);
          });
        });
    }

    function renderCurrentSummary() {
      document.getElementById(
        "firstHalfSummary"
      ).innerHTML = createSummaryCards(
        gameState,
        [1, 2]
      );

      document.getElementById(
        "secondHalfSummary"
      ).innerHTML = createSummaryCards(
        gameState,
        [3, 4]
      );

      document.getElementById(
        "gameSummary"
      ).innerHTML = createSummaryCards(
        gameState,
        [1, 2, 3, 4]
      );

      document.getElementById(
        "quarterTable"
      ).innerHTML = createQuarterTable(gameState);
    }

    function createReportText(game) {
      const opponent = game.opponent || "Opponent";

      return [
        `Lady Lancers vs ${opponent}`,
        "",
        "FIRST HALF",
        `OREB: ${periodTotal(game, "oreb", [1, 2])}`,
        `DREB: ${periodTotal(game, "dreb", [1, 2])}`,
        `Live TO: ${periodTotal(
          game,
          "liveTurnovers",
          [1, 2]
        )}`,
        `Dead TO: ${periodTotal(
          game,
          "deadTurnovers",
          [1, 2]
        )}`,
        `Opponent OREB: ${periodTotal(
          game,
          "opponentOreb",
          [1, 2]
        )}`,
        "",
        "SECOND HALF",
        `OREB: ${periodTotal(game, "oreb", [3, 4])}`,
        `DREB: ${periodTotal(game, "dreb", [3, 4])}`,
        `Live TO: ${periodTotal(
          game,
          "liveTurnovers",
          [3, 4]
        )}`,
        `Dead TO: ${periodTotal(
          game,
          "deadTurnovers",
          [3, 4]
        )}`,
        `Opponent OREB: ${periodTotal(
          game,
          "opponentOreb",
          [3, 4]
        )}`,
        "",
        "GAME TOTALS",
        `OREB: ${periodTotal(
          game,
          "oreb",
          [1, 2, 3, 4]
        )}`,
        `DREB: ${periodTotal(
          game,
          "dreb",
          [1, 2, 3, 4]
        )}`,
        `Live TO: ${periodTotal(
          game,
          "liveTurnovers",
          [1, 2, 3, 4]
        )}`,
        `Dead TO: ${periodTotal(
          game,
          "deadTurnovers",
          [1, 2, 3, 4]
        )}`,
        `Opponent OREB: ${periodTotal(
          game,
          "opponentOreb",
          [1, 2, 3, 4]
        )}`
      ].join("\n");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Report copied");
      } catch {
        window.prompt("Copy this report:", text);
      }
    }

    function toggleSavedDetails(id) {
      const details =
        document.getElementById(`details-${id}`);

      details.classList.toggle("visible");
    }

    function deleteSavedGame(id) {
      const confirmed = confirm(
        "Permanently delete this saved game?"
      );

      if (!confirmed) {
        return;
      }

      savedGames = savedGames.filter(
        (game) => game.id !== id
      );

      saveGameHistory();
      renderSavedGames();
      showToast("Game deleted");
    }

    function renderSavedGames() {
      const list =
        document.getElementById("savedGamesList");

      if (savedGames.length === 0) {
        list.innerHTML = `
          <div class="empty-history">
            No games have been saved yet.
          </div>
        `;

        return;
      }

      list.innerHTML = savedGames
        .map((game) => {
          return `
            <article class="saved-game">
              <div class="saved-game-header">
                <div>
                  <h2 class="saved-opponent">
                    Lady Lancers vs ${game.opponent}
                  </h2>

                  <p class="saved-meta">
                    ${game.date}
                  </p>
                </div>

                <div class="saved-score">
                  ${game.ourScore}–${game.opponentScore}
                </div>
              </div>

              <div class="saved-game-actions">
                <button
                  onclick="toggleSavedDetails(${game.id})"
                >
                  View stats
                </button>

                <button
                  onclick="copyText(
                    createReportText(
                      savedGames.find(
                        game => game.id === ${game.id}
                      )
                    )
                  )"
                >
                  Copy report
                </button>

                <button
                  class="delete-button"
                  onclick="deleteSavedGame(${game.id})"
                >
                  Delete
                </button>
              </div>

              <div
                id="details-${game.id}"
                class="saved-details"
              >
                <h3>First Half</h3>

                <div class="summary-grid">
                  ${createSummaryCards(game, [1, 2])}
                </div>

                <h3>Second Half</h3>

                <div class="summary-grid">
                  ${createSummaryCards(game, [3, 4])}
                </div>

                <h3>Game Totals</h3>

                <div class="summary-grid">
                  ${createSummaryCards(
                    game,
                    [1, 2, 3, 4]
                  )}
                </div>

                <h3>Quarter Breakdown</h3>

                <div class="table-wrapper">
                  <table>
                    <thead>
                      <tr>
                        <th>Quarter</th>
                        <th>OREB</th>
                        <th>DREB</th>
                        <th>Live TO</th>
                        <th>Dead TO</th>
                        <th>Opp OREB</th>
                      </tr>
                    </thead>

                    <tbody>
                      ${createQuarterTable(game)}
                    </tbody>
                  </table>
                </div>
              </div>
            </article>
          `;
        })
        .join("");
    }

    function showScreen(name) {
      const screens = {
        track: document.getElementById("trackScreen"),
        summary: document.getElementById("summaryScreen"),
        history: document.getElementById("historyScreen")
      };

      const tabs = {
        track: document.getElementById("trackTab"),
        summary: document.getElementById("summaryTab"),
        history: document.getElementById("historyTab")
      };

      Object.keys(screens).forEach((key) => {
        screens[key].classList.toggle(
          "active",
          key === name
        );

        tabs[key].classList.toggle(
          "active",
          key === name
        );
      });

      if (name === "history") {
        renderSavedGames();
      }
    }

    function render() {
      document.getElementById("opponent").value =
        gameState.opponent;

      document.getElementById("quarter").value =
        String(gameState.quarter);

      document.getElementById(
        "currentQuarterMessage"
      ).textContent =
        `Currently tracking Quarter ${gameState.quarter}`;

      renderTrackingButtons();
      renderCurrentSummary();
      renderSavedGames();
    }

    document
      .getElementById("opponent")
      .addEventListener("input", (event) => {
        gameState.opponent = event.target.value;
        saveCurrentGame();
      });

    document
      .getElementById("quarter")
      .addEventListener("change", (event) => {
        gameState.quarter = Number(event.target.value);
        saveCurrentGame();
        render();
      });

    document
      .getElementById("trackTab")
      .addEventListener("click", () => {
        showScreen("track");
      });

    document
      .getElementById("summaryTab")
      .addEventListener("click", () => {
        showScreen("summary");
      });

    document
      .getElementById("historyTab")
      .addEventListener("click", () => {
        showScreen("history");
      });

    document
      .getElementById("undoButton")
      .addEventListener("click", undoLastTap);

    document
      .getElementById("nextQuarterButton")
      .addEventListener("click", moveToNextQuarter);

    document
      .getElementById("newGameButton")
      .addEventListener("click", startNewGame);

    document
      .getElementById("saveGameButton")
      .addEventListener("click", saveCompletedGame);

    document
      .getElementById("copyReportButton")
      .addEventListener("click", () => {
        copyText(createReportText(gameState));
      });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register(
          "./service-worker.js"
        );
      });
    }

    render();
  </script>
</body>
</html>
